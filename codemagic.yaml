workflows:
  ios-altstore-build:
    name: Build iOS IPA (Unsigned for AltStore)
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - name: Compilar o iOS App (Ignorando Assinatura da Apple)
        script: |
          cd iosApp
          xcodebuild clean archive \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -archivePath build/iosApp.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Engenharia Reversa do AltStore (Payload -> IPA)
        script: |
          cd iosApp
          mkdir -p Payload
          cp -R build/iosApp.xcarchive/Products/Applications/iosApp.app Payload/
          zip -qr RentMTM.ipa Payload

    artifacts:
      - iosApp/RentMTM.ipa