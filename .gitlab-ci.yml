stages:
  - build

build_ios_ipa_for_altstore:
  stage: build
  # 1. Requisitamos um servidor macOS na nuvem do GitLab
  tags:
    - saas-macos-medium-m1

  variables:
    # Ajuste se o nome da sua pasta/workspace for diferente
    XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
    XCODE_SCHEME: "iosApp"

  script:
    - echo "Iniciando build do iOS ignorando assinaturas da Apple..."

    # 2. Opcional: Garantir que o Java está pronto para o KMP (Gradle)
    - export JAVA_HOME=$(/usr/libexec/java_home -v 17)

    # 3. Compilação Bruta (O segredo está nas variáveis de CODE_SIGN)
    # Isso gera o arquivo .app puro, sem criptografia de desenvolvedor
    - xcodebuild clean archive
      -workspace $XCODE_WORKSPACE
      -scheme $XCODE_SCHEME
      -configuration Release
      -archivePath $CI_PROJECT_DIR/build/iosApp.xcarchive
      CODE_SIGNING_REQUIRED=NO
      CODE_SIGN_IDENTITY=""
      CODE_SIGNING_ALLOWED=NO

    # 4. A Engenharia Reversa do IPA
    - echo "Empacotando para o formato aceito pelo AltStore..."
    - mkdir -p Payload
    - cp -R $CI_PROJECT_DIR/build/iosApp.xcarchive/Products/Applications/iosApp.app Payload/
    - zip -qr RentMTM.ipa Payload

  # 5. Expor o artefato final para você baixar
  artifacts:
    name: "RentMTM-iOS-AltStore"
    paths:
      - RentMTM.ipa
    expire_in: 3 days # O arquivo fica disponível por 3 dias para download