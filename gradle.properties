# Kotlin
kotlin.code.style=official

# 1. Ajuste fino de memória: 4GB é o limite matemático seguro para o Mac M2 Free.
# Adicionamos -XX:+UseG1GC que é um coletor de lixo melhor para compilação agressiva
kotlin.daemon.jvm.options=-Xmx4g -XX:+UseG1GC

# Gradle
# 2. Limitamos a quantidade de "trabalhadores" (workers) simultâneos
# Isso impede que o Gradle crie múltiplas threads que competem pela mesma RAM
org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC -Dfile.encoding=UTF-8 -XX:MaxMetaspaceSize=1g
org.gradle.workers.max=1
org.gradle.parallel=false

# 3. Cache
org.gradle.configuration-cache=true
org.gradle.caching=true

# Android
android.nonTransitiveRClass=true
android.useAndroidX=true

# 4. A BALA DE PRATA (Konan Optimization):
# Isso desliga parte do otimizador de caches do compilador nativo.
# A compilação pode ficar uns 2 minutos mais lenta, mas ele para de tentar
# carregar a árvore inteira do banco de dados na RAM de uma vez.
kotlin.native.cacheKind=none