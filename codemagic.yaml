workflows:
  ios-altstore-build:
    name: Build iOS IPA (Unsigned for AltStore)
    # Requisitamos o Mac Mini M2 gratuito deles
    instance_type: mac_mini_m2
    # Define um limite de tempo para não torrar seus minutos se o script travar
    max_build_duration: 60
    
    environment:
      java_version: 17 # Essencial para o KMP e o Gradle rodarem

    scripts:
      - name: Compilar o iOS App (Ignorando Assinatura da Apple)
        script: |
          cd iosApp
          # O comando bruto do Xcode para gerar o .app sem criptografia
          xcodebuild clean archive \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -archivePath build/iosApp.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Engenharia Reversa do AltStore (Payload -> IPA)
        script: |
          cd iosApp
          mkdir -p Payload
          cp -R build/iosApp.xcarchive/Products/Applications/iosApp.app Payload/
          zip -qr RentMTM.ipa Payload

    # Aqui dizemos ao Codemagic onde o arquivo final estará para download
    artifacts:
      - iosApp/RentMTM.ipa